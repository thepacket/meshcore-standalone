[LilyGo_TDeck]
extends = esp32_base
board = t-deck
build_flags =
  ${esp32_base.build_flags}
  ${sensor_base.build_flags}
  -I variants/lilygo_tdeck
  -D LILYGO_TDECK
  -D BOARD_HAS_PSRAM=1
  -D CORE_DEBUG_LEVEL=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D PIN_USER_BTN=0  ; Trackball button
  -D PIN_PERF_POWERON=10 ; Peripheral power pin
  -D PIN_BOARD_SDA=18 ; shared I2C SDA (keyboard 0x55 + GT911 touch)
  -D PIN_BOARD_SCL=8  ; shared I2C SCL  -- board.begin() must own these pins
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  ; default radio params (USA/Canada MeshCore preset): 910.525 MHz / 62.5 kHz / SF7 / CR5 / 22 dBm
  -D LORA_FREQ=910.525
  -D LORA_BW=62.5
  -D LORA_SF=7
  -D LORA_CR=5
  -D LORA_TX_POWER=22
  -D SX126X_DIO2_AS_RF_SWITCH=true  ; T-Deck SX1262 routes the TX/RX antenna switch via DIO2
  -D LORA_PATH_HASH_MODE=2  ; default path-hash mode (3-byte) to match the network
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8f
  -D P_LORA_DIO_1=45 ; LORA IRQ pin
  -D ENV_INCLUDE_GPS=1
  -D ENV_INCLUDE_AHTX0=0
  -D ENV_INCLUDE_BME280=0
  -D ENV_INCLUDE_BMP280=0
  -D ENV_INCLUDE_SHTC3=0
  -D ENV_INCLUDE_SHT4X=0
  -D ENV_INCLUDE_LPS22HB=0
  -D ENV_INCLUDE_INA3221=0
  -D ENV_INCLUDE_INA219=0
  -D ENV_INCLUDE_INA226=0
  -D ENV_INCLUDE_INA260=0
  -D ENV_INCLUDE_MLX90614=0
  -D ENV_INCLUDE_VL53L0X=0
  -D ENV_INCLUDE_BME680=0
  -D ENV_INCLUDE_BMP085=0
  -D P_LORA_NSS=9    ; LORA SS pin
  -D P_LORA_RESET=17 ; LORA RST pin
  -D P_LORA_BUSY=13  ; LORA Busy pin
  -D P_LORA_SCLK=40  ; LORA SCLK pin
  -D P_LORA_MISO=38  ; LORA MISO pin
  -D P_LORA_MOSI=41  ; LORA MOSI pin
  -D DISPLAY_CLASS=ST7789LCDDisplay
  -D DISPLAY_SCALE_X=2.5
  -D DISPLAY_SCALE_Y=3.75
  -D PIN_TFT_RST=-1
  -D PIN_TFT_VDD_CTL=-1
  -D PIN_TFT_LEDA_CTL=42
  -D PIN_TFT_CS=12
  -D PIN_TFT_DC=11
  -D PIN_TFT_SCL=40
  -D PIN_TFT_SDA=41
  -D PIN_GPS_RX=43
  -D PIN_GPS_TX=44
  -D GPS_BAUD_RATE=38400
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/lilygo_tdeck>
  +<helpers/sensors/*.cpp>
  +<helpers/ui/ST7789LCDDisplay.cpp>
lib_deps =
  ${esp32_base.lib_deps}
  ${sensor_base.lib_deps}
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0

[env:LilyGo_TDeck_companion_radio_usb]
extends = LilyGo_TDeck
build_flags =
  ${LilyGo_TDeck.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  ; --- standalone touch UI (companion only): LovyanGFX + GT911 touch via TDeckDisplay ---
  -D TDECK_TOUCH_UI=1
  -D UI_HAS_KEYBOARD=1
  -D TDECK_KB_ADDR=0x55
  -D UI_HAS_TRACKBALL=1
  -D PIN_TRACKBALL_UP=3
  -D PIN_TRACKBALL_DOWN=15
  -D PIN_TRACKBALL_LEFT=1
  -D PIN_TRACKBALL_RIGHT=2
  -D UI_DEVICE_LABEL='"TDeck+"'
  -D HAVE_QRCODEGEN=1
build_src_filter = ${LilyGo_TDeck.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<helpers/ui/LGFXDisplay.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${LilyGo_TDeck.lib_deps}
  densaugeo/base64 @ ~1.4.0
  lovyan03/LovyanGFX @ ^1.1.16

; Android-style LVGL UI (companion only) -- same firmware as _usb but the
; on-device UI is the LVGL Material screens (ui-lvgl) instead of bitmap ui-new.
[env:LilyGo_TDeck_companion_radio_usb_lvgl]
extends = LilyGo_TDeck
build_flags =
  ${LilyGo_TDeck.build_flags}
  -I examples/companion_radio/ui-lvgl
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  -D TDECK_TOUCH_UI=1
  -D TDECK_LVGL_UI=1
  -D LV_CONF_INCLUDE_SIMPLE=1
  -D UI_HAS_KEYBOARD=1
  -D TDECK_KB_ADDR=0x55
  -D UI_HAS_TRACKBALL=1
  -D PIN_TRACKBALL_UP=3
  -D PIN_TRACKBALL_DOWN=15
  -D PIN_TRACKBALL_LEFT=1
  -D PIN_TRACKBALL_RIGHT=2
  -D UI_DEVICE_LABEL='"TDeck+"'
build_src_filter = ${LilyGo_TDeck.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<helpers/ui/LGFXDisplay.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-lvgl/*.c>
  +<../examples/companion_radio/ui-lvgl/*.cpp>
lib_deps =
  ${LilyGo_TDeck.lib_deps}
  densaugeo/base64 @ ~1.4.0
  lovyan03/LovyanGFX @ ^1.1.16
  lvgl/lvgl @ ^9.2.3

[env:LilyGo_TDeck_companion_radio_ble]
extends = LilyGo_TDeck
build_flags =
  ${LilyGo_TDeck.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D OFFLINE_QUEUE_SIZE=256
  ; --- standalone touch UI (companion only): LovyanGFX + GT911 touch via TDeckDisplay ---
  -D TDECK_TOUCH_UI=1
  -D UI_HAS_KEYBOARD=1
  -D TDECK_KB_ADDR=0x55
  -D UI_HAS_TRACKBALL=1
  -D PIN_TRACKBALL_UP=3
  -D PIN_TRACKBALL_DOWN=15
  -D PIN_TRACKBALL_LEFT=1
  -D PIN_TRACKBALL_RIGHT=2
  -D UI_DEVICE_LABEL='"TDeck+"'
  -D HAVE_QRCODEGEN=1
build_src_filter = ${LilyGo_TDeck.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<helpers/ui/LGFXDisplay.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${LilyGo_TDeck.lib_deps}
  densaugeo/base64 @ ~1.4.0
  lovyan03/LovyanGFX @ ^1.1.16

[env:LilyGo_TDeck_repeater]
extends = LilyGo_TDeck
build_flags =
  ${LilyGo_TDeck.build_flags}
  -D ADVERT_NAME='"TDeck Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
build_src_filter = ${LilyGo_TDeck.build_src_filter}
  +<../examples/simple_repeater>
  +<helpers/ui/ST7789LCDDisplay.cpp>
lib_deps =
  ${LilyGo_TDeck.lib_deps}
  ${esp32_ota.lib_deps}

[env:LilyGo_TDeck_kiss_modem]
extends = LilyGo_TDeck
build_src_filter = ${LilyGo_TDeck.build_src_filter}
  +<../examples/kiss_modem/>
