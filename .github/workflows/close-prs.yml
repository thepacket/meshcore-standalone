name: Auto-close pull requests

# This is an independent derivative of MeshCore; pull requests are not accepted.
# Any PR opened against this repo is closed automatically with a note.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Thanks for your interest. This is an independent personal project that does not accept pull requests — you're welcome to fork it. Closing automatically."
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: "closed"
            });
